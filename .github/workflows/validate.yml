name: Validate Demo Environment

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint and Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install cryptography

      - name: Validate Docker Compose syntax
        run: docker compose -f demo/docker-compose.yml config --quiet

      - name: Check SPIFFE ID format in compose file
        run: |
          python3 - <<'EOF'
          import re, sys

          with open("demo/docker-compose.yml") as f:
              content = f.read()

          # Find all SPIFFE_ID values
          ids = re.findall(r"SPIFFE_ID=(.+)", content)
          pattern = re.compile(r"^spiffe://[a-z0-9.\-]+/[a-z0-9.\-/]+$")

          errors = []
          for spiffe_id in ids:
              spiffe_id = spiffe_id.strip()
              if not pattern.match(spiffe_id):
                  errors.append(f"Invalid SPIFFE ID format: {spiffe_id}")

          if errors:
              for e in errors:
                  print(f"ERROR: {e}", file=sys.stderr)
              sys.exit(1)

          print(f"Validated {len(ids)} SPIFFE IDs: OK")
          for id in ids:
              print(f"  {id.strip()}")
          EOF

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Build all images
        run: docker compose -f demo/docker-compose.yml build

      - name: Smoke test CA startup
        run: |
          docker compose -f demo/docker-compose.yml up -d spiffe_ca
          sleep 5
          docker compose -f demo/docker-compose.yml ps spiffe_ca
          docker compose -f demo/docker-compose.yml down
